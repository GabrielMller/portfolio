name: Deploy Monitoring Stack

on:
  push:
    branches: [ "main" ]
    paths:
      - 'infra/monitoring/**'
  workflow_dispatch: # Permite execução manual pelo painel do GitHub

jobs:
  monitoring-deploy:
    runs-on: self-hosted # Executa diretamente no seu servidor local

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Prepare Monitoring Namespace
        run: |
          export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
          # Cria o namespace se não existir
          kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -

      - name: Network Diagnostic (Pre-flight)
        run: |
          export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
          echo "Verificando se o endpoint do Postgres está acessível na rede interna..."
          # Removido o -it para funcionar no GitHub Actions. Usamos --attach para ver o log.
          # O comando nc -zv testa a conexão TCP e retorna 0 se sucesso ou 1 se falha.
          kubectl run net-test --image=busybox -n monitoring --rm --restart=Never --attach -- /bin/sh -c "nc -zv postgres-core-rw.postgres.svc.cluster.local 9187" || echo "AVISO: Falha na conexão TCP direta entre namespaces."

      - name: Apply Prometheus Stack
        run: |
          export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
          # Aplica ConfigMap, Deployment e Service
          kubectl apply -f infra/monitoring/prometheus-stack.yaml
          
          # Força o restart do pod para ler as novas configurações do ConfigMap
          kubectl rollout restart deployment/prometheus -n monitoring

      - name: Verify Health
        run: |
          export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
          echo "Aguardando inicialização do Prometheus..."
          sleep 10
          kubectl get pods -n monitoring
          kubectl get svc -n monitoring