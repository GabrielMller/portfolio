name: Build and Push Mule Image

on:
  push:
    branches: [ "main" ]
    paths:
      - 'api-mulesoft/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR with Maven
        run: |
          cd api-mulesoft
          mvn clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./api-mulesoft
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mule-teste:latest
  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to K3s
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

          envsubst < api-mulesoft/k8s/mule-deployment.yaml | kubectl apply -f -

          kubectl apply -f api-mulesoft/k8s/mule-ingress.yaml

          kubectl apply -f api-mulesoft/k8s/localtunnel.yaml

          kubectl apply -f api-mulesoft/k8s/mule-deployment.yaml
          
          kubectl rollout restart deployment/mule-teste