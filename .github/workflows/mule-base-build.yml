name: Build and Push Mule Base Image

on:
  push:
    branches: [ "main" ]
    paths:
      - 'infra/docker/mule-base.Dockerfile'
  workflow_dispatch: # Permite rodar manualmente se necessário

jobs:
  build-base:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Base Image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: infra/docker/mule-base.Dockerfile
          push: true
          # Marcamos como 4.9.0 e também como latest para facilitar o uso
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/mule-runtime-base:4.9.0
            ${{ secrets.DOCKERHUB_USERNAME }}/mule-runtime-base:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max