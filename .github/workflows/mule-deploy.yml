name: Build and Push Mule Image

on:
  push:
    branches: [ "main" ]
    paths:
      - 'api-mulesoft/**'
  workflow_dispatch:
    inputs:
      api_to_deploy:
        description: 'Selecione a API para deploy manual (ou "all" para todas)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - mule-eapi
          - monitoring-sapi

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      active_apis: ${{ steps.set-matrix.outputs.apis }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Check for API changes (Push)
        if: github.event_name == 'push'
        uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            mule-eapi: 'api-mulesoft/mule-eapi/**'
            monitoring-sapi: 'api-mulesoft/monitoring-sapi/**'

      - name: Set Matrix Output
        id: set-matrix
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.api_to_deploy }}" == "all" ]; then
              echo "apis=[\"mule-eapi\", \"monitoring-sapi\"]" >> $GITHUB_OUTPUT
            else
              echo "apis=[\"${{ github.event.inputs.api_to_deploy }}\"]" >> $GITHUB_OUTPUT
            fi
          else
            echo "apis=${{ steps.filter.outputs.changes }}" >> $GITHUB_OUTPUT
          fi

  build:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.active_apis != '[]' && needs.detect-changes.outputs.active_apis != '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        api: ${{ fromJson(needs.detect-changes.outputs.active_apis) }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build JAR with Maven
        run: |
          cd api-mulesoft/${{ matrix.api }}
          mvn clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./api-mulesoft/${{ matrix.api }}
          file: ./api-mulesoft/${{ matrix.api }}/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.api }}:latest
          build-args: |
            API_NAME=${{ matrix.api }}
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            MULE_ENV=prd
            SECURE_KEY=${{ secrets.SECURE_KEY }}

  deploy:
    needs: [detect-changes, build]
    if: ${{ needs.detect-changes.outputs.active_apis != '[]' && needs.detect-changes.outputs.active_apis != '' }}
    runs-on: self-hosted
    strategy:
      matrix:
        api: ${{ fromJson(needs.detect-changes.outputs.active_apis) }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to K3s
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          API_NAME: ${{ matrix.api }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          SECURE_KEY: ${{ secrets.SECURE_KEY }}
          MULE_ENV: prd
        run: |
          export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
          
          # Injetando as variáveis no template de deployment
          envsubst '${DOCKERHUB_USERNAME} ${MULE_ENV} ${API_NAME} ${POSTGRES_USER} ${POSTGRES_PASSWORD} ${SECURE_KEY}' < api-mulesoft/k8s/mule-deployment-template.yaml > deploy-final.yaml
          
          kubectl apply -f deploy-final.yaml
          kubectl rollout restart deployment/${{ matrix.api }} -n mulesoft