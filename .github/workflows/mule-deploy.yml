name: Build and Push Mule Image

on:
  push:
    branches: [ "main" ]
    paths:
      - 'api-mulesoft/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        api: [mule-eapi]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR with Maven
        run: |
          cd api-mulesoft/${{ matrix.api }}
          mvn clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./api-mulesoft/${{ matrix.api }}
          file: ./api-mulesoft/${{ matrix.api }}/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.api }}:latest
          build-args: |
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            API_NAME=${{ matrix.api }}

  deploy:
    needs: build
    runs-on: self-hosted
    strategy:
      matrix:
        api: [mule-eapi, monitoring-sapi]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to K3s
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          API_NAME: ${{ matrix.api }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          SECURE_KEY: ${{ secrets.SECURE_KEY }}
        run: |
          export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

          # 1. Garante o namespace
          kubectl create namespace mulesoft --dry-run=client -o yaml | kubectl apply -f -

          # 2. Injeta variáveis e gera um arquivo temporário para conferência se houver erro
          # Usamos aspas simples no envsubst para proteger variáveis do K8s
          envsubst '${DOCKERHUB_USERNAME} ${API_NAME} ${POSTGRES_USER} ${POSTGRES_PASSWORD} ${SECURE_KEY}' < api-mulesoft/k8s/mule-deployment-template.yaml > final-deployment.yaml
          
          # 3. Aplica o arquivo gerado
          kubectl apply -f final-deployment.yaml

          # 4. Reinicia o deploy
          kubectl rollout restart deployment/${{ matrix.api }} -n mulesoft