name: Build and Push Mule Image

on:
  push:
    branches: [ "main" ]
    paths:
      - 'api-mulesoft/**'
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      active_apis: ${{ steps.filter.outputs.changes }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Check for API changes
        uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            mule-eapi: 'api-mulesoft/mule-eapi/**'
            monitoring-sapi: 'api-mulesoft/monitoring-sapi/**'
            users-sapi: 'api-mulesoft/users-sapi/**'
            users-papi: 'api-mulesoft/users-papi/**'

  build:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.active_apis != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        api: ${{ fromJson(needs.detect-changes.outputs.active_apis) }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run MUnit Tests
        run: |
          cd api-mulesoft/${{ matrix.api }}
          mvn test \
            -DSECURE_KEY=${{ secrets.SECURE_KEY }} \
            -DDB_USER= \
            -DDB_PASS= \
            -DAPI_NAME=${{ matrix.api }}

      - name: Build JAR with Maven
        run: |
          cd api-mulesoft/${{ matrix.api }}
          mvn clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./api-mulesoft/${{ matrix.api }}
          file: ./api-mulesoft/${{ matrix.api }}/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.api }}:latest
          build-args: |
            API_NAME=${{ matrix.api }}
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            MULE_ENV=prd
            SECURE_KEY=${{ secrets.SECURE_KEY }}

  deploy:
    needs: [detect-changes, build]
    if: ${{ needs.detect-changes.outputs.active_apis != '[]' }}
    runs-on: self-hosted
    strategy:
      matrix:
        api: ${{ fromJson(needs.detect-changes.outputs.active_apis) }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to K3s
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          API_NAME: ${{ matrix.api }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          SECURE_KEY: ${{ secrets.SECURE_KEY }}
          MULE_ENV: prd
        run: |
          export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
          kubectl create namespace mulesoft --dry-run=client -o yaml | kubectl apply -f -

          envsubst '${DOCKERHUB_USERNAME} ${API_NAME} ${POSTGRES_USER} ${POSTGRES_PASSWORD} ${SECURE_KEY} ${MULE_ENV}' < api-mulesoft/k8s/mule-deployment-template.yaml > deploy-final.yaml
          
          kubectl apply -f deploy-final.yaml
          kubectl rollout restart deployment/${{ matrix.api }} -n mulesoft