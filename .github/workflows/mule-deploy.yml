name: Build and Push Mule Image

on:
  push:
    branches: [ "main" ]
    paths:
      - 'api-mulesoft/**'
  workflow_dispatch:

jobs:
  build:
    # O build corre em ambiente GitHub para poupar recursos do seu servidor
    runs-on: ubuntu-latest
    strategy:
      matrix:
        api: [mule-eapi]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR with Maven
        run: |
          cd api-mulesoft/${{ matrix.api }}
          mvn clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./api-mulesoft/${{ matrix.api }}
          push: true
          file: ./api-mulesoft/${{ matrix.api }}/Dockerfile
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.api }}:latest
          build-args: |
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}

  deploy:
    needs: build
    runs-on: self-hosted
    strategy:
      matrix:
        api: [mule-eapi]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to K3s
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          API_NAME: ${{ matrix.api }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

          kubectl create namespace mulesoft --dry-run=client -o yaml | kubectl apply -f -

          envsubst < api-mulesoft/k8s/mule-deployment-template.yaml | kubectl apply -f -

          kubectl rollout restart deployment/${{ matrix.api }} -n mulesoft